<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelab BIPD</title>
    
    <!-- Memuatkan font Inter dari Google Fonts untuk teks yang kemas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Memuatkan Tailwind CSS untuk penggayaan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Latar belakang kelabu gelap yang kemas menyerupai tema 'dark mode' yang elegan */
            background-color: #111827; 
            color: #f3f4f6;
        }
        
        /* Kesan 'hover' dan animasi lembut untuk butang */
        .link-button {
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            background-color: #1e40af; /* Warna biru sedikit gelap apabila di-hover */
        }
        .link-button:active {
            transform: translateY(1px);
        }

        .countdown-card {
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.28), transparent 34%),
                linear-gradient(145deg, rgba(17, 24, 39, 0.96), rgba(31, 41, 55, 0.92));
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .countdown-unit {
            background: rgba(15, 23, 42, 0.74);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start pt-12 pb-8 px-4 sm:px-6 lg:px-8">
    
    <main class="w-full max-w-md mx-auto flex flex-col items-center">
        
        <!-- Gambar Logo -->
        <div class="relative w-44 h-32 mb-4 flex items-center justify-center">
            <!-- Menggunakan imej baharu: LOGO-BIPD-BM.png untuk kegunaan Netlify -->
            <img 
                src="logo-kelab-bipd.png" 
                alt="Logo Kelab BIPD" 
                class="relative z-10 w-full h-full object-contain drop-shadow-xl"
                onerror="this.onerror=null; this.src='https://placehold.co/150x150/1f2937/f3f4f6?text=BIPD';"
            >
        </div>

        <!-- Tajuk Halaman / Nama Kelab -->
        <h1 class="text-2xl font-bold text-white mb-2 text-center tracking-tight">
            Kelab BIPD
        </h1>
        
        <!-- Penerangan ringkas (Pilihan) -->
        <p class="text-gray-400 text-sm mb-8 text-center px-4">
            Pautan rasmi untuk platform dan perkhidmatan Kelab BIPD.
        </p>

        <!-- Countdown Tutup Pencalonan -->
        <section class="countdown-card w-full mb-6 border border-blue-400/20 rounded-2xl p-4 sm:p-5 shadow-lg overflow-hidden">
            <div class="flex items-center justify-between gap-3 mb-4">
                <div>
                    <p class="text-[11px] font-semibold uppercase tracking-[0.22em] text-blue-200">
                        Tutup Pencalonan
                    </p>
                    <p class="text-sm font-medium text-white mt-1">
                        28 Julai 2026, 12:00 tengah hari
                    </p>
                </div>
                <div class="h-10 w-10 shrink-0 rounded-full bg-blue-500/15 border border-blue-300/20 flex items-center justify-center text-blue-100">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>

            <div id="nominationCountdown" class="grid grid-cols-4 gap-2 sm:gap-3 text-center" aria-live="polite">
                <div class="countdown-unit rounded-xl py-3 px-2 border border-white/10">
                    <span id="countdownDays" class="block text-2xl sm:text-3xl font-bold text-white leading-none">00</span>
                    <span class="block mt-1 text-[10px] sm:text-[11px] font-medium uppercase tracking-wide text-gray-400">Hari</span>
                </div>
                <div class="countdown-unit rounded-xl py-3 px-2 border border-white/10">
                    <span id="countdownHours" class="block text-2xl sm:text-3xl font-bold text-white leading-none">00</span>
                    <span class="block mt-1 text-[10px] sm:text-[11px] font-medium uppercase tracking-wide text-gray-400">Jam</span>
                </div>
                <div class="countdown-unit rounded-xl py-3 px-2 border border-white/10">
                    <span id="countdownMinutes" class="block text-2xl sm:text-3xl font-bold text-white leading-none">00</span>
                    <span class="block mt-1 text-[10px] sm:text-[11px] font-medium uppercase tracking-wide text-gray-400">Minit</span>
                </div>
                <div class="countdown-unit rounded-xl py-3 px-2 border border-white/10">
                    <span id="countdownSeconds" class="block text-2xl sm:text-3xl font-bold text-white leading-none">00</span>
                    <span class="block mt-1 text-[10px] sm:text-[11px] font-medium uppercase tracking-wide text-gray-400">Saat</span>
                </div>
            </div>
            <p id="countdownMessage" class="mt-4 rounded-lg bg-blue-500/10 border border-blue-300/10 px-3 py-2 text-xs text-blue-100 text-center">
                Masa berbaki sebelum pencalonan ditutup
            </p>
        </section>

        <div class="w-full flex flex-col gap-4">
            
            <!-- Butang Pautan 1: e-Undi -->
            <a 
                href="https://script.google.com/macros/s/AKfycbwwFrV7kab5LRfk_WR6mQVyBjnNMOqnp4t_kkEnqCiIENNx3L3XfqLKiWdsU20g0nnrAA/exec" 
                target="_blank" 
                rel="noopener noreferrer"
                class="link-button block w-full bg-blue-600 text-white font-medium text-center py-4 px-6 rounded-xl shadow-md border border-blue-500/30 flex items-center justify-center space-x-2"
            >
                <!-- Ikon (Pilihan - menggunakan SVG inline untuk kemasan) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>e-Undi Kelab BIPD</span>
            </a>
            
            <!-- Tempat untuk menambah butang lain pada masa hadapan -->
            <!-- 
            <a href="#" class="link-button block w-full bg-gray-800 text-white font-medium text-center py-4 px-6 rounded-xl shadow-md border border-gray-700 flex items-center justify-center space-x-2">
                <span>Pautan Seterusnya...</span>
            </a> 
            -->

        </div>
    </main>

    <footer class="mt-auto pt-12 w-full text-center">
        <p class="text-xs text-gray-500">
            &copy; <span id="currentYear"></span> Kelab BIPD. Hak Cipta Terpelihara.
        </p>
    </footer>

    <script>
        // Set tahun semasa secara automatik di footer
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        const nominationDeadline = new Date('2026-07-28T12:00:00+08:00').getTime();
        const countdownDays = document.getElementById('countdownDays');
        const countdownHours = document.getElementById('countdownHours');
        const countdownMinutes = document.getElementById('countdownMinutes');
        const countdownSeconds = document.getElementById('countdownSeconds');
        const countdownMessage = document.getElementById('countdownMessage');

        function padTime(value) {
            return String(value).padStart(2, '0');
        }

        function updateNominationCountdown() {
            const distance = nominationDeadline - Date.now();

            if (distance <= 0) {
                countdownDays.textContent = '00';
                countdownHours.textContent = '00';
                countdownMinutes.textContent = '00';
                countdownSeconds.textContent = '00';
                countdownMessage.textContent = 'Pencalonan telah ditutup.';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((distance / (1000 * 60)) % 60);
            const seconds = Math.floor((distance / 1000) % 60);

            countdownDays.textContent = padTime(days);
            countdownHours.textContent = padTime(hours);
            countdownMinutes.textContent = padTime(minutes);
            countdownSeconds.textContent = padTime(seconds);
        }

        updateNominationCountdown();
        setInterval(updateNominationCountdown, 1000);
    </script>
</body>
</html>
